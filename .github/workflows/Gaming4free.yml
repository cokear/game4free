name: Gaming4free Auto Renew

on:
  repository_dispatch:
    types: [game]
  workflow_dispatch:


permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Install System Dependencies
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get -o Acquire::ForceIPv4=true install -y xvfb

    - name: 安装并启动 sing-box (TUN 全局)
      env:
        PROXY_STR: ${{ secrets.PROXY_STR }}
        PROXY_MODE: tun
        SINGBOX_VERSION: "1.10.7"
      run: |
        set -e
        echo "[INFO] 下载 sing-box ${SINGBOX_VERSION}..."
        curl -sL -o sing-box.tar.gz \
          "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-amd64.tar.gz"
        tar -xzf sing-box.tar.gz
        sudo install -m 755 "sing-box-${SINGBOX_VERSION}-linux-amd64/sing-box" /usr/local/bin/sing-box
        sing-box version

        echo "[INFO] 生成 config.json (PROXY_MODE=${PROXY_MODE})..."
        python convert_proxy.py
        sing-box check -c config.json && echo "[INFO] config.json 校验通过"

        echo "[INFO] 后台启动 sing-box..."
        sudo sing-box run -c config.json > singbox.log 2>&1 &
        echo $! | sudo tee /tmp/singbox.pid >/dev/null

        echo "[INFO] 等待 TUN 接口就绪..."
        for i in $(seq 1 20); do
          if ip link show | grep -q tun; then
            echo "[INFO] TUN 接口已就绪"; break
          fi
          sleep 1
        done
        sleep 3

        echo "[INFO] sing-box 日志:"
        cat singbox.log || true

        echo "[INFO] 出口 IP（应为住宅 IP，不是 GitHub runner IP）:"
        curl -s --max-time 15 https://api.ipify.org > /dev/null && echo "[INFO] 出口 IP 获取成功" || echo "[WARN] 出口 IP 获取失败"
        echo "[INFO] 目标域名解析测试:"
        curl -s --max-time 15 -o /dev/null -w "host2play HTTP:%{http_code}\n" https://gaming4free.net || echo "[WARN] 目标站点连接失败"

    - name: Run Script
      env:
        
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py
    - name: 🧹 清理旧的工作流运行记录
      if: always()
      env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow="${{ github.workflow }}" --limit=100 --json databaseId --jq '.[].databaseId')
          count=0
          for run_id in $runs; do
            count=$((count + 1))
            if [ $count -gt 1 ]; then
              echo "删除运行记录: $run_id"
              gh run delete $run_id || true
            fi
          done   

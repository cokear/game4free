name: Gaming4free Auto Renew

on:
  repository_dispatch:
    types: [game]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb xdotool

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests

    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Sing-box)
      env:
        PROXY_STR: ${{ secrets.PROXY }}
      run: |
        wget -qO- https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz | tar xz
        sudo mv sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
        python convert_proxy.py
        nohup sing-box run -c config.json > singbox.log 2>&1 &
        sleep 5
        curl -s -o /dev/null --connect-timeout 10 -x http://127.0.0.1:8080 https://api.ipify.org && echo "✅ Tunnel OK"

    - name: Run Script
      env:
        PROXY: http://127.0.0.1:8080
        TG_TOKEN: ${{ secrets.TG_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        SERVERS: ${{ secrets.SERVERS }}
      run: |
        xvfb-run -a python gaming4free.py

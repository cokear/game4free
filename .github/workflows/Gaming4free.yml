name: Gaming4free Auto Renew

on:
  workflow_dispatch:

# ⚠️ 必须添加权限配置，允许 Action 修改仓库文件
permissions:
  contents: write

jobs:
  run_renewal:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install seleniumbase requests
        
    - name: Setup Chrome
      run: |
        seleniumbase install chromedriver

    - name: Setup Proxy Tunnel (Sing-box)
      env:
        PROXY_URL: ${{ secrets.PROXY }} 
      run: |
        # 下载并提取 sing-box (1.9.3 版本)
        wget -qO- https://github.com/SagerNet/sing-box/releases/download/v1.9.3/sing-box-1.9.3-linux-amd64.tar.gz | tar xz
        sudo mv sing-box-1.9.3-linux-amd64/sing-box /usr/local/bin/
        
        # 运行同目录的转换脚本，生成 config.json
        # (脚本会自动读取 secrets.PROXY 生成指向 8080 的配置)
        python convert_proxy.py
        
        # 在后台以静默方式启动 sing-box
        nohup sing-box run -c config.json > singbox.log 2>&1 &
        
        # 给它 5 秒钟启动时间
        sleep 5
        
        # 测试 8080 端口的代理连通性
        curl -il -x socks5://127.0.0.1:8080 https://api.ipify.org

    - name: Run Script
      env:
        PROXY: socks5://127.0.0.1:8080         # 已更新为 8080 端口
        TG_TOKEN: ${{ secrets.TG_TOKEN }}      # 映射 Secret
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}  # 映射 Secret
        SERVERS: ${{ secrets.SERVERS }}        # 映射 Secret
      run: |
        # 使用 xvfb 运行以支持强力过人机验证模式
        xvfb-run -a python gaming4free.py
